services:
  - type: web
    name: query-morph
    env: ruby
    region: singapore        # closest to India — options: oregon, frankfurt, ohio, singapore
    plan: free
    buildCommand: "bundle install && bundle exec rails assets:precompile && bundle exec rails db:create db:migrate"
    startCommand: "bundle exec rails server -p $PORT -e production"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false           # ← paste value from config/master.key in the Render dashboard
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RUBY_VERSION
        value: "3.4.2"
